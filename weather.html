<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather </title>
    <!-- bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- bootstrap Icon link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Custom Css -->
    <link rel="stylesheet" href="./style.css">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="Weather-div bg-weather">
        <div class="inner-container weather-container">
            <h1 class="fw-bold">Weather Forcast</h1>
            <div class="weather-inout-div mx-4 py-4 d-flex gap-3 align-items-center ">
                <input type="text" id="input-city" class="form-control" placeholder="Enter Your City">
                <i class="bi bi-search" id="search-btn"></i>
            </div>

            <div class="">
                <img src="./assests/clear.png" alt="" class="weather-img">
                <p class="m-0 celcius" id="celcius">7°C</p>
                <span class="m-0 fs-4" id="show-city">Delhi</span>

                <div class="other">
                    <div class="humidity">
                        <div class="humidity-img"><img src="./assests/humidity.png" alt=""></div>
                        <div class="humidity-percentage">
                            <h3 class="description mt-2">Humidity</h3>
                            <h3 class="temp" id="humidity-percentage">48%</h3>
                        </div>
                    </div>

                    <div class="wind">
                        <div class="Wind-img"><img src="./assests/wind.png" alt=""></div>
                        <div class="Wind-Speed">
                            <h3 class="desc mt-2">Wind speed</h3>
                            <h3 class="speed" id="wind-speed">10.29km/hr</h3>
                        </div>

                    </div>

                </div>
            </div>


        </div>
    </div>
</body>

<script src="./script.js"></script>

</html>
